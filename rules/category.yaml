# 采购项目分类规则
# 格式: 规则按顺序匹配，首次命中即止
# must_any: project_name 中至少含一个词
# must_not: project_name 中不能含任何一个词
# 编辑本文件无需修改代码，运行 add_std_category.py 即可生效

categories:

