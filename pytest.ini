[pytest]
# 2026-07-07 补单测任务（T-1 ~ T-6）
# 防 P0-1 / P0-4 / P1-1 / P1-2 / P1-3 / P0-3 修复回归
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -ra
    --strict-markers
    --tb=short
    # -v  # 默认不加 v，CI 加 --verbose
filterwarnings =
    ignore::DeprecationWarning
    ignore::urllib3.exceptions.NotOpenSSLWarning
markers =
    slow: 慢测（暂未启用）
    integration: 集成测（暂未启用）
